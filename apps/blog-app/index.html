<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dale Nguyen's Blog</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/src/favicon.ico" />
    <link rel="stylesheet" href="/src/styles.css" />

    <!-- Logichat — loaded on first user interaction to keep its SDK off the critical path -->
    <script>
      // Global callback used by the Logichat SDK once it loads
      function onLogichatEvent(event) {
        if (event.type === 'sdkLoaded') {
          const element = $logichat.V1.createElement('faq', {})
          element.mount('#logichat-faq-widget')
        }
      }
      ;(function () {
        var loaded = false
        function loadLogichat() {
          if (loaded) return
          loaded = true
          var s = document.createElement('script')
          s.src = 'https://sdk.logichat.io/js/widget.js?appId=lg_czNzY4OD'
          s.defer = true
          s.id = 'logichat-sdk'
          document.head.appendChild(s)
        }
        var events = ['click', 'keydown', 'touchstart']
        function onFirst() {
          loadLogichat()
          events.forEach(function (e) {
            window.removeEventListener(e, onFirst)
          })
        }
        events.forEach(function (e) {
          window.addEventListener(e, onFirst, { once: true, passive: true })
        })
      })()
    </script>
    <!-- End Logichat -->
  </head>
  <body>
    <dalenguyen-root />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
